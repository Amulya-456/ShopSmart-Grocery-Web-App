<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - G-Mart</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="logo">G-Mart Admin</div>
    </nav>

    <div class="login-container">
        <div class="login-box">

            <h2>Admin Login</h2>

            {% if error %}
            <p style="color:red; text-align:center;">
                {{ error }}
            </p>
            {% endif %}

            <form action="/adminlogin" method="POST">

                <label>Admin Username</label>
                <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required
                >

                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <p class="signup-text">
                Don't have an admin account?
                <a href="{{ url_for('admin_signup') }}">Sign Up</a>
            </p>

        </div>
    </div>

</body>
</html>
