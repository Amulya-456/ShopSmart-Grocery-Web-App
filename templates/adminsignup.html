<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Signup - G-Mart</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

    <nav class="navbar">
        G-Mart Admin
    </nav>

    <div class="login-container">
        <div class="login-box">

            <h2>Admin Sign Up</h2>

            {% if error %}
            <p style="color:red; text-align:center;">
                {{ error }}
            </p>
            {% endif %}

            <form action="/adminsignup" method="POST">
            <div class="input-group">
                <label>Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter Full Name"
                    required>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter Username"
                    required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter Password"
                    required>
            </div>

                <button type="submit">
                    Sign Up
                </button>

            </form>

            <p class="signup-text">
                Already have an account?
                <a href="{{ url_for('admin_login') }}">
                    Login
                </a>
            </p>

        </div>
    </div>

</body>
</html>
