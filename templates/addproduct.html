<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - G-Mart</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='product.css') }}">
</head>
<body>

    <nav class="navbar">

        <div class="logo">G-Mart</div>

        <ul>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/users">Users</a></li>
            <li><a href="/products">Products</a></li>
            <li><a href="/add-product" class="active">Add Product</a></li>
            <li><a href="/admin-orders">Orders</a></li>
            <li><a href="/adminlogin">Logout</a></li>
        </ul>

    </nav>

    <div class="container">

        <h2>Add Product</h2>

        <form id="productForm">

            <div class="form-row">

                <div>
                    <label>Product Name</label>
                    <input
                        type="text"
                        id="productname"
                        placeholder="Enter product name"
                        required>
                </div>

                <div>
                    <label>Rating</label>
                    <input
                        type="number"
                        id="rating"
                        placeholder="Enter product rating"
                        required>
                </div>

                <div>
                    <label>Price</label>
                    <input
                        type="number"
                        id="price"
                        placeholder="Enter product price"
                        required>
                </div>

            </div>

            <div class="form-row">

                <div>
                    <label>Image URL</label>
                    <input
                        type="text"
                        id="image"
                        placeholder="Enter image URL"
                        required>
                </div>

                <div>
                    <label>Category</label>

                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="vegetables">Vegetables</option>
                        <option value="fruits">Fruits</option>
                        <option value="dairy">Dairy</option>
                        <option value="meat">Meat</option>
                    </select>
                </div>

                <div>
                    <label>Count In Stock</label>
                    <input
                        type="number"
                        id="countInStock"
                        placeholder="Enter stock quantity"
                        required>
                </div>

            </div>

            <div class="form-row full-width">

                <div>
                    <label>Description</label>

                    <textarea
                        id="description"
                        placeholder="Enter product description"
                        required></textarea>
                </div>

            </div>

            <button type="submit" class="submit-btn">
                Add Product
            </button>

        </form>

    </div>

    <script src="{{ url_for('static', filename='add_product.js') }}"></script>

</body>
</html>
